name: warningnoti
description: 실시간 재난 알림 앱 - 기상청 API 기반 재난 경보 및 위치 기반 알림 서비스
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.6.1

  # 라우팅
  go_router: ^14.8.1

  # HTTP 클라이언트 (기상청 API)
  dio: ^5.7.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  cloud_firestore: ^5.6.5

  # 위치 서비스
  geolocator: ^13.0.2

  # 권한 관리
  permission_handler: ^11.3.1

  # 지도
  google_maps_flutter: ^2.12.1

  # 로컬 저장
  shared_preferences: ^2.3.4

  # 날짜/시간 포맷
  intl: ^0.20.2

  # 로컬 알림
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
